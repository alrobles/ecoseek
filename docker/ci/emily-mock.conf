# Emily (Hermes Agent API server) mock for CI
# Returns a valid /health response and a stub /v1/chat/completions
server {
    listen 8642;
    server_name localhost;

    # Health check — Emilly and ecoseek-api check this
    location /health {
        default_type application/json;
        return 200 '{"status":"ok","platform":"hermes-agent"}';
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Stub chat completions — returns a minimal valid OpenAI-format response
    location /v1/chat/completions {
        default_type application/json;
        return 200 '{"id":"mock-emily","object":"chat.completion","model":"emily","choices":[{"index":0,"message":{"role":"assistant","content":"Emily CI mock response."},"finish_reason":"stop"}],"usage":{"prompt_tokens":0,"completion_tokens":0,"total_tokens":0}}';
    }
}
