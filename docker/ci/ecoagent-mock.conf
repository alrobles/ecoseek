server {
    listen 8000 default_server;
    server_name _;

    # /v1/tools — EcoAgent tool listing (healthcheck endpoint)
    location = /v1/tools {
        default_type application/json;
        return 200 '{"tools":[]}';
    }

    # Default catch-all
    location / {
        default_type application/json;
        return 200 '{"status":"ok"}';
    }
}
