server {
    listen 8080 default_server;
    server_name _;

    # /healthz — AgenticPlug gateway probe (smoke step 1)
    location = /healthz {
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    # /v1/connectors — Phase 1 contract (smoke step 2)
    location = /v1/connectors {
        default_type application/json;
        return 200 '{"connectors":[]}';
    }

    # /v1/cli/session — needed for smoke setup
    location = /v1/cli/session {
        default_type application/json;
        return 200 '{"session_id":"ci-mock-session"}';
    }

    # Default catch-all
    location / {
        default_type application/json;
        return 200 '{"status":"ok"}';
    }
}
