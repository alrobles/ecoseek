[uwsgi]
# SearxNG uWSGI configuration for EcoSeek.
# Bind to all interfaces inside the container; Docker exposes only the mapped port.
http = 0.0.0.0:8080
workers = %k
threads = 4
chunk-size = 8192

# Keep the master process and recycle workers periodically to avoid memory drift.
master = true
max-requests = 2000
harakiri = 30
harakiri-verbose = true

# Module
module = searx.webapp:application
manage-script-name = true
mount = /=searx.webapp:application
