# EcoSeek DIY-mode Docker Compose
#
# Starts the minimum viable stack for local development:
# - AgenticPlug broker (gateway)
# - Ollama (local model inference)
#
# Usage (recommended):
#   bash setup.sh                    # clones repos + builds + starts
#
# Manual:
#   git clone https://github.com/alrobles/agenticplug.git .repos/agenticplug
#   docker compose up --build
#
# Works on Linux, macOS, and Windows (WSL or native Docker Desktop).
# Repos are cloned on the host (where your git auth works), then
# COPY'd into Docker — no GitHub credentials needed inside containers.
#
# The EcoSeek client (agenticSeek) is not containerized here because
# it needs access to the user's display, browser, and local filesystem.
# Run it directly on the host — see docs/install.md.
#
# Do NOT use real secrets, API keys, or production credentials at this stage.

services:
  broker:
    build:
      context: .repos/agenticplug
      dockerfile: ../../docker/broker.Dockerfile
    environment:
      BROKER_PORT: "3000"
      BROKER_SESSION_STORE: memory
    ports:
      - "3000:3000"
    volumes:
      - broker-data:/data

  # ecoagent: (uncomment when ecoagent is ready for release)
  #   build:
  #     context: .repos/ecoagent
  #     dockerfile: ../../docker/ecoagent.Dockerfile
  #   environment:
  #     ECOAGENT_PORT: "8100"
  #     ECOAGENT_HOST: "0.0.0.0"
  #   ports:
  #     - "8100:8100"

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    # GPU passthrough (uncomment if NVIDIA GPU available):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  broker-data:
  ollama-data:
