# EcoSeek — full Docker Compose stack
#
# One-command install:
#   bash setup.sh && docker compose up -d
#
# What starts (base stack, CPU-only):
#   - EcoSeek API        (FastAPI backend / orchestrator)     → http://127.0.0.1:${ECOSEEK_API_PORT:-3000}
#   - AgenticPlug        (gateway: auth, policy, audit)       → http://127.0.0.1:${AGENTICPLUG_PORT:-8080}
#   - EcoAgent           (tool server, 30+ ecological tools)  → http://127.0.0.1:${ECOAGENT_PORT:-8000}
#   - Ollama             (local model inference, CPU)         → http://127.0.0.1:${OLLAMA_PORT:-11434}
#   - SearxNG            (private web search, used by API)    (internal)
#   - Redis              (task queue)                         (internal)
#
# Optional profiles:
#   - gpu             — replaces CPU Ollama with NVIDIA-passthrough Ollama
#                       docker compose --profile gpu up
#                       (CPU `ollama` is in profile `cpu`; default base stack
#                        activates `cpu` automatically; see COMPOSE_PROFILES below.)
#   - observability   — adds Arize Phoenix tracing UI
#                       docker compose --profile observability up
#                       Publishes Phoenix on 127.0.0.1:${PHOENIX_PORT:-6006}
#                       (the container always listens on 6006 internally).
#   - frontend        — EcoSeek React web UI (thin SPA, talks to broker)
#                       docker compose --profile frontend up
#                       Publishes frontend on 127.0.0.1:${FRONTEND_PORT:-4000}
#   - r-workspace     — R geospatial workspace (rocker/geospatial + HTTP bridge)
#                       docker compose --profile r-workspace up
#                       Emily executes R code via POST /execute on port 8787
#
# All host port publications are bound to 127.0.0.1 so the stack is reachable
# only from the local machine. If you need LAN/remote access, edit the
# `ports:` entries explicitly — do not let unauthenticated services
# (Ollama, /healthz) leak onto a network.
#
# All ports, model names, and endpoints are configurable via .env.
# Run setup.sh / setup.ps1 to generate a starter .env on first use.
#
# NOTE: `COMPOSE_PROFILES` is set in .env by setup.sh to `cpu` so that
# the default `docker compose up` brings the CPU Ollama variant. Using
# `--profile gpu` swaps in the GPU variant. The two are mutually
# exclusive because they share the host port ${OLLAMA_PORT}.

services:
  # ── EcoSeek API (lightweight FastAPI gateway) ──────────────────────────
  # Builds from ./backend — no agenticSeek dependency. Routes queries to
  # Hermes (via AgenticPlug /v1/orchestrate), AgenticPlug chat completions,
  # or a local OpenAI-compatible LLM, with a configurable fallback chain.
  # See backend/api.py for the full /v1/query contract.
  ecoseek-api:
    build:
      context: ./backend
    container_name: ecoseek-api
    ports:
      # Loopback-only by design: the FastAPI backend has no authentication
      # at this layer (auth lives in AgenticPlug). Do not change 127.0.0.1
      # to 0.0.0.0 — that would expose the orchestrator to the LAN.
      - "127.0.0.1:${ECOSEEK_API_PORT:-3000}:3000"
    environment:
      # BACKEND_PORT is intentionally derived from ECOSEEK_API_PORT (and
      # NOT read from a separate BACKEND_PORT env var) so the host-side
      # publication and the in-container listener can never drift. To
      # change the port, set ECOSEEK_API_PORT in .env — do not override
      # BACKEND_PORT directly.
      BACKEND_PORT: "3000"
      AGENTICPLUG_URL: "http://agenticplug:${AGENTICPLUG_PORT:-8080}"
      HERMES_ENABLED: "${HERMES_ENABLED:-false}"
      HERMES_URL: "${HERMES_URL:-}"
      HERMES_API_KEY: "${HERMES_API_KEY:-}"
      UPSTREAM_TIMEOUT_S: "${UPSTREAM_TIMEOUT_S:-30}"
      LOCAL_LLM_URL: "${LOCAL_LLM_URL:-}"
      LOCAL_LLM_API_KEY: "${LOCAL_LLM_API_KEY:-}"
      # Phoenix / OpenTelemetry tracing (disabled by default).
      # Enable with PHOENIX_ENABLED=true and --profile observability.
      PHOENIX_ENABLED: "${PHOENIX_ENABLED:-false}"
      PHOENIX_ENDPOINT: "${PHOENIX_ENDPOINT:-http://phoenix:6006/v1/traces}"
      PHOENIX_PROJECT_NAME: "${PHOENIX_PROJECT_NAME:-ecoseek}"
    depends_on:
      agenticplug:
        condition: service_healthy
      redis:
        condition: service_healthy
      searxng:
        condition: service_started
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen(
          'http://localhost:3000/'
          ).status < 500 else 1)"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ecoseek-net

  # ── AgenticPlug gateway (auth, policy, audit) ──────────────────────────
  agenticplug:
    build:
      context: .repos/agenticplug
      dockerfile: ../../docker/broker.Dockerfile
    container_name: agenticplug
    environment:
      BROKER_HOST: "0.0.0.0"
      BROKER_PORT: "${AGENTICPLUG_PORT:-8080}"
      # Session store backend. `sqlite` is the alpha default: sessions
      # persist across `docker compose restart agenticplug` via the
      # broker-data named volume mounted at /data. Override with
      # BROKER_SESSION_STORE=memory in .env for tests/dev where ephemeral
      # state is acceptable. The memory backend is NOT suitable for
      # production or anything that requires audit retention.
      BROKER_SESSION_STORE: "${BROKER_SESSION_STORE:-sqlite}"
      ECOAGENT_URL: "http://ecoagent:${ECOAGENT_PORT:-8000}"
      OLLAMA_URL: "http://ollama:${OLLAMA_PORT:-11434}"
      # Required by /v1/chat/completions (AgenticPlug PR #80). Fixed path
      # /api/chat is appended by the broker; the client never picks the
      # upstream URL. Without this, every chat-completions request returns
      # 503 model_route_unconfigured (the route fails closed by design).
      OLLAMA_BASE_URL: "http://ollama:${OLLAMA_PORT:-11434}"
      # Optional GitHub login allowlist for CLI session handshake. Comma-
      # separated GitHub logins. Empty = fail-closed (no sessions can be
      # issued). The smoke test reads AGENTICPLUG_SESSION from .env; set
      # this list to your GitHub login if you want to obtain one.
      AGENTICPLUG_ALLOWED_LOGINS: "${AGENTICPLUG_ALLOWED_LOGINS:-}"
      # Hermes remote orchestration service. When HERMES_ENABLED=true,
      # AgenticPlug forwards /v1/orchestrate requests to HERMES_URL.
      # Fail-closed when HERMES_ENABLED=false (default).
      HERMES_URL: "${HERMES_URL:-}"
      HERMES_API_KEY: "${HERMES_API_KEY:-}"
      HERMES_ENABLED: "${HERMES_ENABLED:-false}"
    ports:
      - "127.0.0.1:${AGENTICPLUG_PORT:-8080}:${AGENTICPLUG_PORT:-8080}"
    volumes:
      - broker-data:/data
    depends_on:
      ecoagent:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "require('http').get('http://localhost:'+process.env.BROKER_PORT+'/healthz',
          r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - ecoseek-net

  # ── EcoAgent (tool server, 30+ ecological tools) ───────────────────────
  ecoagent:
    build:
      context: .repos/ecoagent
      dockerfile: ../../docker/ecoagent.Dockerfile
    container_name: ecoagent
    environment:
      ECOAGENT_HOST: "0.0.0.0"
      ECOAGENT_PORT: "${ECOAGENT_PORT:-8000}"
      ECOAGENT_PROFILE: "${ECOAGENT_PROFILE:-ci}"
    ports:
      - "127.0.0.1:${ECOAGENT_PORT:-8000}:${ECOAGENT_PORT:-8000}"
    command:
      - python
      - -m
      - ecoagent.tool_server
      - --host
      - 0.0.0.0
      - --port
      - "${ECOAGENT_PORT:-8000}"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,os;
          urllib.request.urlopen('http://localhost:'+os.environ['ECOAGENT_PORT']+'/v1/tools')"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - ecoseek-net

  # ── Ollama, CPU variant (profile: cpu — default via COMPOSE_PROFILES) ──
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    profiles: ["cpu"]
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - "ollama list >/dev/null 2>&1 || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - ecoseek-net

  # ── Ollama, NVIDIA GPU variant (profile: gpu) ──────────────────────────
  # Activate with: docker compose --profile gpu up
  # Mutually exclusive with the CPU variant — both publish ${OLLAMA_PORT}.
  ollama-gpu:
    image: ollama/ollama:latest
    container_name: ollama
    profiles: ["gpu"]
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - "ollama list >/dev/null 2>&1 || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - ecoseek-net

  # ── SearxNG (private web search, used by the API) ──────────────────────
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: searxng
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: "${SEARXNG_BASE_URL:-http://localhost:8080/}"
      UWSGI_WORKERS: "${UWSGI_WORKERS:-4}"
      UWSGI_THREADS: "${UWSGI_THREADS:-4}"
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -qO- http://localhost:8080/healthz >/dev/null 2>&1 || exit 1"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ecoseek-net

  # ── Redis / Valkey (task queue) ────────────────────────────────────────
  redis:
    image: docker.io/valkey/valkey:8-alpine
    container_name: redis
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    volumes:
      - redis-data:/data
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ecoseek-net

  # ── Phoenix observability (profile: observability) ─────────────────────
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix
    profiles: ["observability"]
    ports:
      - "127.0.0.1:${PHOENIX_PORT:-6006}:6006"
    environment:
      PHOENIX_PROJECT_NAME: "${PHOENIX_PROJECT_NAME:-ecoseek}"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request;
          urllib.request.urlopen('http://localhost:6006/')" || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ecoseek-net

  # ── EcoSeek API, remote-only variant (profile: remote) ───────────────
  # Thin mode for the PoC: runs only the API gateway pointing at a remote
  # AgenticPlug broker. No local EcoAgent, Ollama, SearxNG, or Redis.
  #
  #   cp .env.remote.example .env
  #   # edit .env with your remote broker URL
  #   docker compose --profile remote up
  #
  # Or without Docker:
  #   pip install -e ecoseek-client
  #   ecoseek login --broker https://your-agenticplug-url
  #   ecoseek hermes orchestrate "List mammal species in Yucatan"
  ecoseek-api-remote:
    build:
      context: ./backend
    container_name: ecoseek-api-remote
    profiles: ["remote"]
    ports:
      - "127.0.0.1:${ECOSEEK_API_PORT:-3000}:3000"
    environment:
      BACKEND_PORT: "3000"
      # Point to the remote AgenticPlug broker (not local container)
      AGENTICPLUG_URL: "${AGENTICPLUG_URL:?Set AGENTICPLUG_URL in .env to the remote broker}"
      HERMES_ENABLED: "${HERMES_ENABLED:-true}"
      HERMES_URL: "${HERMES_URL:-}"
      HERMES_API_KEY: "${HERMES_API_KEY:-}"
      UPSTREAM_TIMEOUT_S: "${UPSTREAM_TIMEOUT_S:-120}"
      LOCAL_LLM_URL: "${LOCAL_LLM_URL:-}"
      LOCAL_LLM_API_KEY: "${LOCAL_LLM_API_KEY:-}"
      PHOENIX_ENABLED: "${PHOENIX_ENABLED:-false}"
      PHOENIX_ENDPOINT: "${PHOENIX_ENDPOINT:-}"
      PHOENIX_PROJECT_NAME: "${PHOENIX_PROJECT_NAME:-ecoseek}"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen(
          'http://localhost:3000/'
          ).status < 500 else 1)"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - ecoseek-net

  # ── EcoSeek Frontend (React SPA) ────────────────────────────────────
  # Standalone web UI that talks directly to the AgenticPlug broker.
  # Auth via GitHub OAuth redirect, chat via /v1/chat/completions.
  #
  #   docker compose --profile frontend up
  #
  # Or for development (runs on port 3001 to avoid OpenWebUI on 3000):
  #   cd frontend && npm install && npm start
  ecoseek-frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BROKER_URL: "${REACT_APP_BROKER_URL:-https://broker.ecoseek.org}"
    container_name: ecoseek-frontend
    profiles: ["frontend"]
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-4000}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - ecoseek-net

  # ── R Workspace (rocker/geospatial + HTTP bridge) ────────────────────
  # Full R geospatial environment for agentic R code execution.
  # Emily generates R code → sends to r-workspace via HTTP → reads results.
  #
  #   docker compose --profile r-workspace up
  #
  # Pre-installed: sf, terra, raster, dismo, vegan, ape, rgbif, taxize,
  # ENMeval, spocc, CoordinateCleaner, biomod2, rnaturalearth, tidyverse.
  # Emily communicates via POST /execute on port 8787 (internal).
  r-workspace:
    build:
      context: .
      dockerfile: docker/r-workspace.Dockerfile
    container_name: r-workspace
    profiles: ["r-workspace"]
    ports:
      - "127.0.0.1:${R_WORKSPACE_PORT:-8787}:8787"
    environment:
      R_WORKSPACE_DIR: "/workspace"
      R_WORKSPACE_PORT: "8787"
      R_EXEC_TIMEOUT: "${R_EXEC_TIMEOUT:-300}"
    volumes:
      - r-workspace-data:/workspace
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python3 -c "import urllib.request;
          urllib.request.urlopen('http://localhost:8787/health')" || exit 1
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - ecoseek-net

  # ── Emily Local Agent (Hermes fork with ecoseek plugin) ──────────────
  # Lightweight ecological AI assistant that runs locally and can escalate
  # heavy tasks to the remote Hermes on reumanlab via the broker.
  #
  #   docker compose --profile emily up
  #
  # Requires at least one LLM backend:
  #   - DEEPSEEK_API_KEY for DeepSeek API (BYOK)
  #   - OLLAMA_BASE_URL for a local Ollama instance
  #   - Or the remote Hermes via ECOSEEK_BROKER_URL (escalation only)
  emily:
    build:
      context: ./emily
    container_name: emily
    profiles: ["emily"]
    ports:
      - "127.0.0.1:${EMILY_PORT:-8642}:8642"
    environment:
      ECOSEEK_BROKER_URL: "${ECOSEEK_BROKER_URL:-https://broker.ecoseek.org}"
      ECOSEEK_BROKER_KEY: "${ECOSEEK_BROKER_KEY:-}"
      ECOSEEK_MODEL: "${ECOSEEK_MODEL:-hermes}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-}"
      API_SERVER_KEY: "${EMILY_API_KEY:-emily-local-key}"
      API_SERVER_CORS_ORIGINS: "http://localhost:4000,http://localhost:3001,http://127.0.0.1:4000"
      R_WORKSPACE_URL: "http://r-workspace:8787"
    volumes:
      - emily-data:/root/.hermes
      - r-workspace-data:/workspace
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8642/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - ecoseek-net

volumes:
  broker-data:
  ollama-data:
  redis-data:
  emily-data:
  r-workspace-data:

networks:
  ecoseek-net:
    driver: bridge
