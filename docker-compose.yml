# EcoSeek — lightweight Docker Compose stack (v2)
#
# One-command install:
#   cp .env.example .env && docker compose up -d
#
# Core stack (starts by default):
#   - Emily              (Hermes Agent API server)             → http://127.0.0.1:8642
#   - EcoSeek API        (FastAPI thin router)                 → http://127.0.0.1:3000
#   - EcoAgent           (tool server, 30+ ecological tools)   → http://127.0.0.1:8000
#   - Ollama             (local model inference, CPU)          → http://127.0.0.1:11434
#   - SearxNG            (private web search)                  (internal)
#   - Redis              (task queue)                          (internal)
#
# Emily is the PRIMARY backend — a full Hermes Agent instance with the
# ecoseek plugin + Emily scientific personality. The API server exposes
# an OpenAI-compatible endpoint at /v1/chat/completions that ecoseek-api
# routes to directly (no AgenticPlug/Task Bridge needed for chat).
#
# Optional profiles:
#   - gpu             — replaces CPU Ollama with NVIDIA-passthrough
#                       docker compose --profile gpu up
#   - observability   — adds Arize Phoenix tracing UI
#                       docker compose --profile observability up
#   - frontend        — EcoSeek React web UI
#                       docker compose --profile frontend up
#   - agenticplug     — AgenticPlug broker (auth/sessions, optional fallback)
#                       docker compose --profile agenticplug up
#   - r-workspace     — R geospatial workspace (rocker/geospatial + HTTP bridge)
#                       docker compose --profile r-workspace up
#
# Cloudflare Tunnels (configure separately):
#   chat.ecoseek.org   → Hermes Agent API on reumanlab
#   emily.ecoseek.org  → Emily API server (this stack, port 8642)
#
# All host port publications are bound to 127.0.0.1 so the stack is reachable
# only from the local machine. If you need LAN/remote access, edit the
# `ports:` entries explicitly.

services:
  # ── Emily — Hermes Agent API server (PRIMARY backend) ───────────────────
  # Emily IS the brain. Full Hermes Agent with ecoseek plugin, Emily
  # scientific personality, and all tools (eco_analyze, web_search, etc.).
  # Exposes OpenAI-compatible /v1/chat/completions at port 8642.
  # ecoseek-api routes directly here — no AgenticPlug/Task Bridge needed.
  emily:
    build:
      context: ./emily
    container_name: emily
    ports:
      - "127.0.0.1:${EMILY_PORT:-8642}:8642"
    environment:
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-}"
      API_SERVER_KEY: "${EMILY_API_KEY:-emily-local-key}"
      API_SERVER_CORS_ORIGINS: "${API_SERVER_CORS_ORIGINS:-http://localhost:4000,http://localhost:3000,http://127.0.0.1:4000}"
      R_WORKSPACE_URL: "${R_WORKSPACE_URL:-http://r-workspace:8787}"
      # Hermes remote for DiDAL escalation (optional)
      HERMES_ECOSEEK_API_KEY: "${HERMES_ECOSEEK_API_KEY:-}"
      HERMES_REMOTE_URL: "${HERMES_REMOTE_URL:-https://hermes.ecoseek.org}"
      HERMES_REMOTE_MODEL: "${HERMES_REMOTE_MODEL:-hermes-fast}"
      HERMES_FAST_MODEL: "${HERMES_FAST_MODEL:-hermes-fast}"
      DIDAL_ENABLED: "${DIDAL_ENABLED:-true}"
      DIDAL_MAX_CRITIQUE_ROUNDS: "${DIDAL_MAX_CRITIQUE_ROUNDS:-1}"
      DIDAL_STREAM_DRAFT: "${DIDAL_STREAM_DRAFT:-true}"
      DIDAL_STAGE_TIMEOUT: "${DIDAL_STAGE_TIMEOUT:-30}"
      DIDAL_PROTOCOL_TIMEOUT: "${DIDAL_PROTOCOL_TIMEOUT:-90}"
      ENTREZ_API_KEY: "${ENTREZ_API_KEY:-}"
      ENTREZ_EMAIL: "${ENTREZ_EMAIL:-ecoseek@ecoseek.org}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      ECOSEEK_ARTIFACTS_REPO: "${ECOSEEK_ARTIFACTS_REPO:-alrobles/ecoseek-artifacts}"
      # AgenticPlug fallback (optional)
      ECOSEEK_BROKER_URL: "${ECOSEEK_BROKER_URL:-}"
      ECOSEEK_BROKER_KEY: "${ECOSEEK_BROKER_KEY:-}"
      ECOSEEK_MODEL: "${ECOSEEK_MODEL:-hermes}"
    volumes:
      - emily-data:/root/.hermes
      - r-workspace-data:/workspace
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8642/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - ecoseek-net

  # ── EcoSeek API (thin FastAPI router) ───────────────────────────────────
  # Lightweight router that connects to Emily directly via /v1/chat/completions.
  # Fallback chain: Emily → AgenticPlug → local LLM.
  ecoseek-api:
    build:
      context: ./backend
    container_name: ecoseek-api
    ports:
      - "127.0.0.1:${ECOSEEK_API_PORT:-3000}:3000"
    environment:
      BACKEND_PORT: "3000"
      # Primary: Emily (Hermes Agent API server)
      EMILY_API_URL: "http://emily:8642"
      EMILY_API_KEY: "${EMILY_API_KEY:-emily-local-key}"
      EMILY_ENABLED: "true"
      # Fallback: AgenticPlug (optional)
      AGENTICPLUG_URL: "${AGENTICPLUG_URL:-http://agenticplug:8080}"
      UPSTREAM_TIMEOUT_S: "${UPSTREAM_TIMEOUT_S:-120}"
      LOCAL_LLM_URL: "${LOCAL_LLM_URL:-}"
      LOCAL_LLM_API_KEY: "${LOCAL_LLM_API_KEY:-}"
      # Meilisearch (literature search)
      MEILI_URL: "${MEILI_URL:-http://meilisearch:7700}"
      MEILI_ENABLED: "${MEILI_ENABLED:-true}"
      MEILI_INDEX: "${MEILI_INDEX:-gbif_literature}"
      # Phoenix / OpenTelemetry tracing
      PHOENIX_ENABLED: "${PHOENIX_ENABLED:-false}"
      PHOENIX_ENDPOINT: "${PHOENIX_ENDPOINT:-http://phoenix:6006/v1/traces}"
      PHOENIX_PROJECT_NAME: "${PHOENIX_PROJECT_NAME:-ecoseek}"
    depends_on:
      emily:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen(
          'http://localhost:3000/'
          ).status < 500 else 1)"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - ecoseek-net

  # ── EcoAgent (tool server, 30+ ecological tools) ───────────────────────
  ecoagent:
    build:
      context: .repos/ecoagent
      dockerfile: ../../docker/ecoagent.Dockerfile
    container_name: ecoagent
    environment:
      ECOAGENT_HOST: "0.0.0.0"
      ECOAGENT_PORT: "${ECOAGENT_PORT:-8000}"
      ECOAGENT_PROFILE: "${ECOAGENT_PROFILE:-ci}"
    ports:
      - "127.0.0.1:${ECOAGENT_PORT:-8000}:${ECOAGENT_PORT:-8000}"
    command:
      - python
      - -m
      - ecoagent.tool_server
      - --host
      - 0.0.0.0
      - --port
      - "${ECOAGENT_PORT:-8000}"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,os;
          urllib.request.urlopen('http://localhost:'+os.environ['ECOAGENT_PORT']+'/v1/tools')"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - ecoseek-net

  # ── Ollama, CPU variant ─────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    profiles: ["cpu"]
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - "ollama list >/dev/null 2>&1 || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - ecoseek-net

  # ── Ollama, NVIDIA GPU variant ──────────────────────────────────────────
  ollama-gpu:
    image: ollama/ollama:latest
    container_name: ollama
    profiles: ["gpu"]
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - "ollama list >/dev/null 2>&1 || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - ecoseek-net

  # ── SearxNG (private web search) ────────────────────────────────────────
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: searxng
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: "${SEARXNG_BASE_URL:-http://localhost:8080/}"
      UWSGI_WORKERS: "${UWSGI_WORKERS:-4}"
      UWSGI_THREADS: "${UWSGI_THREADS:-4}"
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -qO- http://localhost:8080/healthz >/dev/null 2>&1 || exit 1"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ecoseek-net

  # ── Redis / Valkey (task queue) ─────────────────────────────────────────
  redis:
    image: docker.io/valkey/valkey:8-alpine
    container_name: redis
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    volumes:
      - redis-data:/data
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ecoseek-net

  # ── AgenticPlug (optional — auth/session broker) ────────────────────────
  # No longer required for basic chat — Emily handles that directly.
  # Use this profile if you need GitHub OAuth sessions, audit trails,
  # or the legacy orchestration endpoint.
  agenticplug:
    build:
      context: .repos/agenticplug
      dockerfile: ../../docker/broker.Dockerfile
    container_name: agenticplug
    profiles: ["agenticplug"]
    environment:
      BROKER_HOST: "0.0.0.0"
      BROKER_PORT: "${AGENTICPLUG_PORT:-8080}"
      BROKER_SESSION_STORE: "${BROKER_SESSION_STORE:-sqlite}"
      ECOAGENT_URL: "http://ecoagent:${ECOAGENT_PORT:-8000}"
      OLLAMA_URL: "http://ollama:${OLLAMA_PORT:-11434}"
      OLLAMA_BASE_URL: "http://ollama:${OLLAMA_PORT:-11434}"
      AGENTICPLUG_ALLOWED_LOGINS: "${AGENTICPLUG_ALLOWED_LOGINS:-}"
      HERMES_URL: "${HERMES_URL:-}"
      HERMES_API_KEY: "${HERMES_API_KEY:-}"
      HERMES_ENABLED: "${HERMES_ENABLED:-false}"
    ports:
      - "127.0.0.1:${AGENTICPLUG_PORT:-8080}:${AGENTICPLUG_PORT:-8080}"
    volumes:
      - broker-data:/data
    depends_on:
      ecoagent:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "require('http').get('http://localhost:'+process.env.BROKER_PORT+'/healthz',
          r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - ecoseek-net

  # ── Phoenix observability ───────────────────────────────────────────────
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix
    profiles: ["observability"]
    ports:
      - "127.0.0.1:${PHOENIX_PORT:-6006}:6006"
    environment:
      PHOENIX_PROJECT_NAME: "${PHOENIX_PROJECT_NAME:-ecoseek}"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request;
          urllib.request.urlopen('http://localhost:6006/')" || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ecoseek-net

  # ── EcoSeek API, remote-only variant ────────────────────────────────────
  # Thin mode: API gateway pointing at a remote Emily instance.
  #   cp .env.remote.example .env
  #   docker compose --profile remote up
  ecoseek-api-remote:
    build:
      context: ./backend
    container_name: ecoseek-api-remote
    profiles: ["remote"]
    ports:
      - "127.0.0.1:${ECOSEEK_API_PORT:-3000}:3000"
    environment:
      BACKEND_PORT: "3000"
      EMILY_API_URL: "${EMILY_API_URL:?Set EMILY_API_URL in .env}"
      EMILY_API_KEY: "${EMILY_API_KEY:-}"
      EMILY_ENABLED: "true"
      AGENTICPLUG_URL: "${AGENTICPLUG_URL:-}"
      UPSTREAM_TIMEOUT_S: "${UPSTREAM_TIMEOUT_S:-120}"
      LOCAL_LLM_URL: "${LOCAL_LLM_URL:-}"
      LOCAL_LLM_API_KEY: "${LOCAL_LLM_API_KEY:-}"
      PHOENIX_ENABLED: "${PHOENIX_ENABLED:-false}"
      PHOENIX_ENDPOINT: "${PHOENIX_ENDPOINT:-}"
      PHOENIX_PROJECT_NAME: "${PHOENIX_PROJECT_NAME:-ecoseek}"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen(
          'http://localhost:3000/'
          ).status < 500 else 1)"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - ecoseek-net

  # ── EcoSeek Frontend (React SPA) ────────────────────────────────────────
  ecoseek-frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BROKER_URL: "${REACT_APP_BROKER_URL:-https://broker.ecoseek.org}"
        REACT_APP_EMILY_URL: "${REACT_APP_EMILY_URL:-http://localhost:8642}"
        REACT_APP_EMILY_KEY: "${REACT_APP_EMILY_KEY:-${EMILY_API_KEY:-emily-local-key}}"
    container_name: ecoseek-frontend
    profiles: ["frontend"]
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-4000}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - ecoseek-net

  # ── Demo Frontend (public, no login) ──────────────────────────────────
  # Public demo for hackathons/challenges. No GitHub OAuth, no cluster
  # access. Chat proxies to demo Hermes on port 8646.
  demo-frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BROKER_URL: "${REACT_APP_BROKER_URL:-https://broker.ecoseek.org}"
        REACT_APP_EMILY_URL: ""
        REACT_APP_EMILY_KEY: ""
        REACT_APP_DEMO_MODE: "true"
    container_name: demo-frontend
    profiles: ["demo"]
    ports:
      - "127.0.0.1:${DEMO_FRONTEND_PORT:-4001}:80"
    volumes:
      - ./frontend/nginx-demo.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - ecoseek-net

  # ── R Workspace (rocker/geospatial + HTTP bridge) ───────────────────────
  r-workspace:
    build:
      context: .
      dockerfile: docker/r-workspace.Dockerfile
    container_name: r-workspace
    profiles: ["r-workspace"]
    ports:
      - "127.0.0.1:${R_WORKSPACE_PORT:-8787}:8787"
    environment:
      R_WORKSPACE_DIR: "/workspace"
      R_WORKSPACE_PORT: "8787"
      R_EXEC_TIMEOUT: "${R_EXEC_TIMEOUT:-300}"
    volumes:
      - r-workspace-data:/workspace
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python3 -c "import urllib.request;
          urllib.request.urlopen('http://localhost:8787/health')" || exit 1
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - ecoseek-net

volumes:
  emily-data:
  broker-data:
  ollama-data:
  redis-data:
  r-workspace-data:

networks:
  ecoseek-net:
    driver: bridge
