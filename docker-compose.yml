# EcoSeek DIY-mode Docker Compose
#
# Starts the minimum viable stack for local development:
# - AgenticPlug broker (gateway)
# - EcoAgent tool server (ecological tools)
# - Ollama (local model inference)
#
# Usage:
#   docker compose up --build        # first run (builds images from GitHub)
#   docker compose up                # subsequent runs (uses cached images)
#
# Works on Linux, macOS, and Windows (WSL or native Docker Desktop).
# No sibling repo clones required — each service fetches its own source.
#
# The EcoSeek client (agenticSeek) is not containerized here because
# it needs access to the user's display, browser, and local filesystem.
# Run it directly on the host — see docs/install.md.
#
# Do NOT use real secrets, API keys, or production credentials at this stage.

services:
  broker:
    build:
      context: .
      dockerfile: docker/broker.Dockerfile
      args:
        AGENTICPLUG_REF: main
    environment:
      BROKER_PORT: "3000"
      BROKER_SESSION_STORE: memory
    ports:
      - "3000:3000"
    volumes:
      - broker-data:/data

  ecoagent:
    build:
      context: .
      dockerfile: docker/ecoagent.Dockerfile
      args:
        ECOAGENT_REF: main
    environment:
      ECOAGENT_PORT: "8100"
      ECOAGENT_HOST: "0.0.0.0"
    ports:
      - "8100:8100"

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    # GPU passthrough (uncomment if NVIDIA GPU available):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  broker-data:
  ollama-data:
