# EcoSeek — full Docker Compose stack
#
# One-command install:
#   bash setup.sh && docker compose up -d
#
# What starts (base stack, CPU-only):
#   - EcoSeek UI         (AgenticSeek client / orchestrator)  → http://localhost:${ECOSEEK_UI_PORT:-3000}
#   - AgenticPlug        (gateway: auth, policy, audit)       → http://localhost:${AGENTICPLUG_PORT:-8080}
#   - EcoAgent           (tool server, 30+ ecological tools)  → http://localhost:${ECOAGENT_PORT:-8000}
#   - Ollama             (local model inference, CPU)         → http://localhost:${OLLAMA_PORT:-11434}
#   - SearxNG            (private web search, used by UI)     (internal)
#   - Redis              (task queue for the client)          (internal)
#
# Optional profiles:
#   - gpu             — enables NVIDIA GPU passthrough for Ollama
#                       docker compose --profile gpu up
#   - observability   — adds Arize Phoenix tracing UI
#                       docker compose --profile observability up
#
# All ports, model names, and credentials are configurable via .env.
# Run setup.sh / setup.ps1 to generate a starter .env on first use.

services:
  # ── EcoSeek UI (AgenticSeek client + orchestrator) ─────────────────────
  ecoseek-ui:
    build:
      context: .repos/agenticSeek
      dockerfile: Dockerfile.backend
    container_name: ecoseek-ui
    ports:
      - "${ECOSEEK_UI_PORT:-3000}:${ECOSEEK_UI_PORT:-3000}"
    volumes:
      - workspace:/opt/workspace
      - screenshots:/app/.screenshots
      - ./config.ini:/app/config.ini:ro
    environment:
      BACKEND_PORT: "${ECOSEEK_UI_PORT:-3000}"
      BACKEND_HOST: "0.0.0.0"
      WORK_DIR: "/opt/workspace"
      SEARXNG_BASE_URL: "${SEARXNG_BASE_URL:-http://searxng:8080}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379/0}"
      DOCKER_INTERNAL_URL: "${DOCKER_INTERNAL_URL:-http://host.docker.internal}"
      AGENTICPLUG_URL: "http://agenticplug:${AGENTICPLUG_PORT:-8080}"
      ECOAGENT_URL: "http://ecoagent:${ECOAGENT_PORT:-8000}"
      OLLAMA_URL: "http://ollama:${OLLAMA_PORT:-11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-ecocoder}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      ECOSEEK_AAR_ENABLED: "${ECOSEEK_AAR_ENABLED:-false}"
      ECOSEEK_JUDGE_MODEL: "${ECOSEEK_JUDGE_MODEL:-auto}"
      PHOENIX_ENDPOINT: "${PHOENIX_ENDPOINT:-}"
      PHOENIX_PROJECT_NAME: "${PHOENIX_PROJECT_NAME:-ecoseek}"
    depends_on:
      agenticplug:
        condition: service_healthy
      ollama:
        condition: service_healthy
      redis:
        condition: service_started
      searxng:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,os,sys;
          sys.exit(0 if urllib.request.urlopen(
          'http://localhost:'+os.environ.get('BACKEND_PORT','3000')+'/'
          ).status < 500 else 1)"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ecoseek-net

  # ── AgenticPlug gateway (auth, policy, audit) ──────────────────────────
  agenticplug:
    build:
      context: .repos/agenticplug
      dockerfile: ../../docker/broker.Dockerfile
    container_name: agenticplug
    environment:
      BROKER_HOST: "0.0.0.0"
      BROKER_PORT: "${AGENTICPLUG_PORT:-8080}"
      BROKER_SESSION_STORE: "${BROKER_SESSION_STORE:-memory}"
      ECOAGENT_URL: "http://ecoagent:${ECOAGENT_PORT:-8000}"
      OLLAMA_URL: "http://ollama:${OLLAMA_PORT:-11434}"
    ports:
      - "${AGENTICPLUG_PORT:-8080}:${AGENTICPLUG_PORT:-8080}"
    volumes:
      - broker-data:/data
    depends_on:
      ecoagent:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "require('http').get('http://localhost:'+process.env.BROKER_PORT+'/healthz',
          r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - ecoseek-net

  # ── EcoAgent (tool server, 30+ ecological tools) ───────────────────────
  ecoagent:
    build:
      context: .repos/ecoagent
      dockerfile: ../../docker/ecoagent.Dockerfile
    container_name: ecoagent
    environment:
      ECOAGENT_HOST: "0.0.0.0"
      ECOAGENT_PORT: "${ECOAGENT_PORT:-8000}"
      ECOAGENT_PROFILE: "${ECOAGENT_PROFILE:-ci}"
    ports:
      - "${ECOAGENT_PORT:-8000}:${ECOAGENT_PORT:-8000}"
    command:
      - python
      - -m
      - ecoagent.tool_server
      - --host
      - 0.0.0.0
      - --port
      - "${ECOAGENT_PORT:-8000}"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,os;
          urllib.request.urlopen('http://localhost:'+os.environ['ECOAGENT_PORT']+'/v1/tools')"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - ecoseek-net

  # ── Ollama (local model inference, CPU by default) ─────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
    healthcheck:
      test:
        - CMD-SHELL
        - "ollama list >/dev/null 2>&1 || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - ecoseek-net

  # ── Ollama with NVIDIA GPU passthrough (profile: gpu) ──────────────────
  # Activate with: docker compose --profile gpu up
  # Replaces the CPU `ollama` service when the profile is active.
  ollama-gpu:
    image: ollama/ollama:latest
    container_name: ollama-gpu
    profiles: ["gpu"]
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test:
        - CMD-SHELL
        - "ollama list >/dev/null 2>&1 || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - ecoseek-net

  # ── SearxNG (private web search, used by the UI) ───────────────────────
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: searxng
    volumes:
      - .repos/agenticSeek/searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: "${SEARXNG_BASE_URL:-http://localhost:8080/}"
      UWSGI_WORKERS: "${UWSGI_WORKERS:-4}"
      UWSGI_THREADS: "${UWSGI_THREADS:-4}"
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    depends_on:
      redis:
        condition: service_started
    networks:
      - ecoseek-net

  # ── Redis / Valkey (task queue) ────────────────────────────────────────
  redis:
    image: docker.io/valkey/valkey:8-alpine
    container_name: redis
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    volumes:
      - redis-data:/data
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ecoseek-net

  # ── Phoenix observability (profile: observability) ─────────────────────
  # Activate with: docker compose --profile observability up
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix
    profiles: ["observability"]
    ports:
      - "${PHOENIX_PORT:-6006}:6006"
    environment:
      PHOENIX_PROJECT_NAME: "${PHOENIX_PROJECT_NAME:-ecoseek}"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request;
          urllib.request.urlopen('http://localhost:6006/')" || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ecoseek-net

volumes:
  broker-data:
  ollama-data:
  redis-data:
  workspace:
  screenshots:

networks:
  ecoseek-net:
    driver: bridge
