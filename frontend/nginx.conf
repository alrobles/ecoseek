server {
  listen 80;
  root /usr/share/nginx/html;

  # SPA fallback — React Router / OAuth callback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Reverse proxy for Hermes remote health check (fixes CORS).
  # The browser cannot call hermes.ecoseek.org directly due to missing
  # CORS headers on the remote gateway. This proxy lets the frontend
  # check remote status without cross-origin issues.
  location /api/hermes-health {
    proxy_pass https://hermes.ecoseek.org/health;
    proxy_ssl_server_name on;
    proxy_set_header Host hermes.ecoseek.org;
    proxy_connect_timeout 10s;
    proxy_read_timeout 10s;
  }

  # Local workspace file browser — serves files from the shared workspace
  # volume so the frontend can list and download files produced by Emily
  # or received from Hermes Beta.
  location /workspace/ {
    alias /workspace/;
    autoindex on;
    autoindex_format json;
    autoindex_localtime on;
    add_header Access-Control-Allow-Origin *;
  }

  # Proxy for Hermes remote file downloads.
  # Hermes Beta on reumanlab can write files to a staging endpoint;
  # this proxy lets the frontend download them without CORS issues.
  location /api/hermes-files/ {
    proxy_pass https://hermes.ecoseek.org/v1/files/;
    proxy_ssl_server_name on;
    proxy_set_header Host hermes.ecoseek.org;
    proxy_connect_timeout 30s;
    proxy_read_timeout 300s;
    proxy_buffering off;
    client_max_body_size 4g;
  }
}
