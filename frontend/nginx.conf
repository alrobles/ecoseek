server {
  listen 80;
  root /usr/share/nginx/html;

  # ── SPA fallback ───────────────────────────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ── Search API proxies (ecoseek-api on port 3000) ──────────────────
  # These are more specific than /v1/ and take precedence in nginx.
  location /v1/search {
    proxy_pass http://host.docker.internal:3000;
    proxy_read_timeout 10s;
    proxy_intercept_errors on;
    error_page 502 503 504 = @api_error;
  }

  location /v1/smart-search {
    proxy_pass http://host.docker.internal:3000;
    proxy_read_timeout 120s;
    proxy_intercept_errors on;
    error_page 502 503 504 = @api_error;
  }

  location /v1/metasearch {
    proxy_pass http://host.docker.internal:3000;
    proxy_read_timeout 180s;
    proxy_intercept_errors on;
    error_page 502 503 504 = @api_error;
  }

  location @api_error {
    default_type application/json;
    return 502 '{"success":false,"error":"Search service temporarily unavailable. Please try again."}';
  }

  # ── Emily API proxy (Hermes gateway on port 8642) ──────────────────
  # Chat, models, and health go to the Hermes gateway on the host.
  # API key is injected server-side — browser never sees it.
  # Handle CORS preflight (OPTIONS) before proxying.
  location /v1/ {
    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin $http_origin always;
      add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
      add_header Access-Control-Max-Age 86400 always;
      return 204;
    }
    proxy_pass http://host.docker.internal:8642/v1/;
    proxy_http_version 1.1;
    proxy_set_header Authorization "Bearer emily-ecoseek-key-2026";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_read_timeout 300s;
    proxy_buffering off;
    client_max_body_size 4g;
  }

  location /health {
    proxy_pass http://host.docker.internal:8642/health;
    proxy_set_header Host $host;
    proxy_connect_timeout 5s;
    proxy_read_timeout 5s;
  }

  # ── Hermes health proxy (same-host, avoids IPv6/Cloudflare issues) ──
  location /api/hermes-health {
    proxy_pass http://host.docker.internal:8642/health;
    proxy_set_header Host $host;
    proxy_connect_timeout 5s;
    proxy_read_timeout 5s;
  }

  # ── Workspace file browser ─────────────────────────────────────────
  location /workspace/ {
    alias /workspace/;
    autoindex on;
    autoindex_format json;
    autoindex_localtime on;
    add_header Access-Control-Allow-Origin *;
  }

  # ── Hermes remote file downloads ───────────────────────────────────
  location /api/hermes-files/ {
    proxy_pass https://hermes.ecoseek.org/v1/files/;
    proxy_ssl_server_name on;
    proxy_set_header Host hermes.ecoseek.org;
    proxy_connect_timeout 30s;
    proxy_read_timeout 300s;
    proxy_buffering off;
    client_max_body_size 4g;
  }
}
